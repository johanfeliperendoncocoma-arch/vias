<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Reporte</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="card shadow">

            <div class="card-header bg-primary text-white">
                <h3>Nuevo Reporte</h3>
            </div>

            <div class="card-body">

                <form id="reporteForm">

                    <div class="mb-3">
                        <label class="form-label">Tipo de Reporte</label>

                        <select id="tipo_reporte" class="form-select">

                            <option value="Accidente">
                                Accidente
                            </option>

                            <option value="Daño Vial">
                                Daño Vial
                            </option>

                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Gravedad</label>

                        <select id="gravedad" class="form-select">

                            <option value="Leve">Leve</option>
                            <option value="Moderada">Moderada</option>
                            <option value="Grave">Grave</option>

                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Descripción</label>

                        <textarea id="descripcion"
                            class="form-control"
                            rows="4"
                            required></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Dirección</label>

                        <input
                            type="text"
                            id="direccion"
                            class="form-control"
                            placeholder="Ingrese la dirección"
                            required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Fotografía de Evidencia</label>

                        <input
                            type="file"
                            id="imagen"
                            class="form-control"
                            accept="image/*">

                        <small class="text-muted">
                            Adjunte una fotografía del accidente o daño vial.
                        </small>
                    </div>

                    <input type="hidden" id="latitud">
                    <input type="hidden" id="longitud">

                    <div class="mb-3">

                        <button
                            type="button"
                            class="btn btn-secondary"
                            onclick="obtenerUbicacion()">

                            📍 Obtener GPS

                        </button>

                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary">

                        💾 Guardar Reporte

                    </button>

                </form>

                <div id="mensaje" class="mt-3"></div>

            </div>

        </div>

    </div>

    <script>

        function obtenerUbicacion() {

            navigator.geolocation.getCurrentPosition(

                (posicion) => {

                    document.getElementById("latitud").value =
                        posicion.coords.latitude;

                    document.getElementById("longitud").value =
                        posicion.coords.longitude;

                    alert("Ubicación obtenida correctamente");

                },

                () => {

                    alert("No fue posible obtener la ubicación");

                }

            );

        }

        document
            .getElementById("reporteForm")
            .addEventListener("submit", async (e) => {

                e.preventDefault();

                try {

                    const usuario =
                        JSON.parse(
                            localStorage.getItem("usuario")
                        );

                    let nombreImagen = "";

                    const archivo =
                        document.getElementById("imagen")
                            .files[0];

                    if (archivo) {

                        const formData =
                            new FormData();

                        formData.append(
                            "imagen",
                            archivo
                        );

                        const subida =
                            await fetch(
                                "http://localhost:3000/api/reportes/upload",
                                {
                                    method: "POST",
                                    body: formData
                                }
                            );

                        const resultadoSubida =
                            await subida.json();

                        nombreImagen =
                            resultadoSubida.ruta;

                    }

                    const datos = {

                        tipo_reporte:
                            document.getElementById("tipo_reporte").value,

                        descripcion:
                            document.getElementById("descripcion").value,

                        gravedad:
                            document.getElementById("gravedad").value,

                        direccion:
                            document.getElementById("direccion").value,

                        latitud:
                            document.getElementById("latitud").value,

                        longitud:
                            document.getElementById("longitud").value,

                        id_usuario:
                            usuario.id,

                        imagen:
                            nombreImagen

                    };

                    const respuesta =
                        await fetch(
                            "http://localhost:3000/api/reportes",
                            {
                                method: "POST",
                                headers: {
                                    "Content-Type": "application/json"
                                },
                                body: JSON.stringify(datos)
                            }
                        );

                    const resultado =
                        await respuesta.json();

                    document.getElementById("mensaje")
                        .innerHTML =
                        `
                        <div class="alert alert-success">
                            ${resultado.mensaje}
                        </div>
                        `;

                    document.getElementById("reporteForm").reset();

                }
                catch (error) {

                    console.error(error);

                    document.getElementById("mensaje")
                        .innerHTML =
                        `
                        <div class="alert alert-danger">
                            Error al guardar el reporte
                        </div>
                        `;

                }

            });

    </script>

</body>

</html>
