<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReporteVial — Iniciar Sesión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      background-color: var(--negro);
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(255,107,0,0.04) 60px, rgba(255,107,0,0.04) 61px),
        repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(255,107,0,0.04) 60px, rgba(255,107,0,0.04) 61px);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .login-wrap {
      width: 100%;
      max-width: 400px;
    }

    .login-card {
      background: var(--gris-oscuro);
      border: 1px solid #222;
      border-top: 3px solid var(--naranja);
      border-radius: var(--radio-lg);
      padding: 2.5rem 2rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    /* Road stripe decoration */
    .road-strip {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-bottom: 2rem;
    }
    .road-strip span {
      height: 4px;
      background: var(--naranja);
      border-radius: 2px;
      flex: 1;
      max-width: 40px;
      opacity: 0.5;
    }
    .road-strip span:nth-child(2) { opacity: 1; max-width: 60px; }

    .login-card .btn-vial { width: 100%; justify-content: center; padding: 0.75rem; font-size: 1rem; }
    .login-card .btn-vial + .btn-vial { margin-top: 0.6rem; }

    .footer-note {
      text-align: center;
      font-size: 0.75rem;
      color: #555;
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <div class="login-wrap">

    <!-- Logo -->
    <div class="app-logo-block">
      <div class="app-logo-circle">🚦</div>
      <h1 class="app-logo-title">ReporteVial</h1>
      <p class="app-logo-tagline">Sistema de Reportes Viales</p>
      <p class="app-description">Plataforma ciudadana para reportar accidentes y daños en la infraestructura vial de tu ciudad.</p>
    </div>

    <div class="login-card">
      <div class="road-strip">
        <span></span><span></span><span></span><span></span><span></span>
      </div>

      <form id="loginForm">

        <div class="form-group-vial">
          <label class="form-label-vial">Correo electrónico</label>
          <input type="email" id="correo" class="form-control-vial" placeholder="tu@correo.com" required>
        </div>

        <div class="form-group-vial">
          <label class="form-label-vial">Contraseña</label>
          <input type="password" id="password" class="form-control-vial" placeholder="••••••••" required>
        </div>

        <div id="mensaje"></div>

        <div style="height:1rem;"></div>

        <button type="submit" class="btn-vial btn-vial-primary">
          🔑 Ingresar al Sistema
        </button>

        <a href="registro.html" class="btn-vial btn-vial-secondary" style="width:100%; justify-content:center; padding:0.75rem; margin-top:0.6rem; text-align:center;">
          ➕ Crear Cuenta Nueva
        </a>

      </form>
    </div>

    <p class="footer-note">Sistema de gestión vial ciudadana &nbsp;·&nbsp; v2.0</p>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const correo = document.getElementById("correo").value;
      const password = document.getElementById("password").value;
      const btn = e.target.querySelector('button[type=submit]');
      const msg = document.getElementById("mensaje");

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-vial"></span>';

      try {
        const respuesta = await fetch("http://localhost:3000/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ correo, password })
        });
        const data = await respuesta.json();

        if (data.success) {
          localStorage.setItem("usuario", JSON.stringify(data.usuario));
          window.location.href = data.usuario.rol === "Administrador" ? "dashboard.html" : "cliente.html";
        } else {
          msg.innerHTML = `<div class="alert-vial alert-vial-danger">⚠ Usuario o contraseña incorrectos</div>`;
          btn.disabled = false;
          btn.innerHTML = '🔑 Ingresar al Sistema';
        }
      } catch (error) {
        msg.innerHTML = `<div class="alert-vial alert-vial-danger">🔌 Error de conexión con el servidor</div>`;
        btn.disabled = false;
        btn.innerHTML = '🔑 Ingresar al Sistema';
      }
    });
  </script>
</body>
</html>
