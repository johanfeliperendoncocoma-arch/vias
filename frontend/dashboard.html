<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container mt-5">

        <h1 class="mb-4">
            🚦 Sistema de Reporte Vial
        </h1>

        <div class="row">

            <div class="col-md-3">
                <div class="card text-center shadow">
                    <div class="card-body">
                        <h5>Total Reportes</h5>
                        <h1 id="total">0</h1>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card text-center shadow">
                    <div class="card-body">
                        <h5>Accidentes</h5>
                        <h1 id="accidentes">0</h1>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card text-center shadow">
                    <div class="card-body">
                        <h5>Daños Viales</h5>
                        <h1 id="danios">0</h1>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card text-center shadow">
                    <div class="card-body">
                        <h5>Pendientes</h5>
                        <h1 id="pendientes">0</h1>
                    </div>
                </div>
            </div>

        </div>

        <div class="mt-5">

            <a href="nuevo-reporte.html" class="btn btn-primary me-2">

                ➕ Nuevo Reporte

            </a>

            <a href="reportes.html" class="btn btn-success">

                📋 Ver Reportes

            </a>

        </div>

    </div>

    <script>

        async function cargarEstadisticas() {

            const respuesta =
                await fetch(
                    "http://localhost:3000/api/reportes/estadisticas"
                );

            const datos =
                await respuesta.json();

            document.getElementById("total")
                .innerText =
                datos.total;

            document.getElementById("accidentes")
                .innerText =
                datos.accidentes;

            document.getElementById("danios")
                .innerText =
                datos.danos;
            document.getElementById("pendientes")
                .innerText =
                datos.pendientes;

        }

        cargarEstadisticas();

        
    </script>

</body>

</html>
