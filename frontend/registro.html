<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Registro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="row justify-content-center">

            <div class="col-md-6">

                <div class="card shadow">

                    <div class="card-header bg-success text-white">

                        <h3>
                            Registro de Usuario
                        </h3>

                    </div>

                    <div class="card-body">

                        <form id="registroForm">

                            <div class="mb-3">

                                <label>
                                    Nombre
                                </label>

                                <input
                                    type="text"
                                    id="nombre"
                                    class="form-control"
                                    required>

                            </div>

                            <div class="mb-3">

                                <label>
                                    Correo
                                </label>

                                <input
                                    type="email"
                                    id="correo"
                                    class="form-control"
                                    required>

                            </div>

                            <div class="mb-3">

                                <label>
                                    Contraseña
                                </label>

                                <input
                                    type="password"
                                    id="password"
                                    class="form-control"
                                    required>

                            </div>

                            <div class="mb-3">

                                <label>
                                    Confirmar Contraseña
                                </label>

                                <input
                                    type="password"
                                    id="confirmar"
                                    class="form-control"
                                    required>

                            </div>

                            <button
                                type="submit"
                                class="btn btn-success">

                                Registrarse

                            </button>

                            <a
                                href="index.html"
                                class="btn btn-secondary">

                                Volver

                            </a>

                        </form>

                        <div
                            id="mensaje"
                            class="mt-3">
                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script>

        document
            .getElementById("registroForm")
            .addEventListener("submit",
                async (e) => {

                    e.preventDefault();

                    const nombre =
                        document
                        .getElementById("nombre")
                        .value;

                    const correo =
                        document
                        .getElementById("correo")
                        .value;

                    const password =
                        document
                        .getElementById("password")
                        .value;

                    const confirmar =
                        document
                        .getElementById("confirmar")
                        .value;

                    if (
                        password !== confirmar
                    ) {

                        document
                            .getElementById("mensaje")
                            .innerHTML =
                            `
                            <div class="alert alert-danger">
                                Las contraseñas no coinciden
                            </div>
                            `;

                        return;

                    }

                    const respuesta =
                        await fetch(
                            "http://localhost:3000/api/registro",
                            {
                                method: "POST",

                                headers: {
                                    "Content-Type":
                                        "application/json"
                                },

                                body: JSON.stringify({

                                    nombre,
                                    correo,
                                    password

                                })

                            }
                        );

                    const resultado =
                        await respuesta.json();

                    if (
                        resultado.success
                    ) {

                        document
                            .getElementById("mensaje")
                            .innerHTML =
                            `
                            <div class="alert alert-success">
                                Usuario registrado correctamente
                            </div>
                            `;

                        setTimeout(() => {

                            window.location =
                                "index.html";

                        }, 2000);

                    } else {

                        document
                            .getElementById("mensaje")
                            .innerHTML =
                            `
                            <div class="alert alert-danger">
                                ${resultado.mensaje}
                            </div>
                            `;

                    }

                });

    </script>

</body>

</html>
